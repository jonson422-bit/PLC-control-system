<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLC 智能管控系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        header h1 { font-size: 24px; color: #00d9ff; }
        .status { 
            display: flex; 
            align-items: center; 
            gap: 10px;
            padding: 8px 16px;
            background: #0f3460;
            border-radius: 20px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .status-dot.online { background: #00ff88; }
        .status-dot.offline { background: #ff4757; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card h2 {
            font-size: 16px;
            color: #888;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .point-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .point {
            background: #0f3460;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s;
        }
        .point:hover { transform: translateY(-2px); }
        .point-name { font-size: 12px; color: #888; margin-bottom: 5px; }
        .point-value { font-size: 18px; font-weight: bold; }
        .point-value.on { color: #00ff88; }
        .point-value.off { color: #ff4757; }
        .point-value.analog { color: #00d9ff; }
        
        .analog-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .analog-item {
            background: #0f3460;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .analog-value {
            font-size: 36px;
            font-weight: bold;
            color: #00d9ff;
        }
        .analog-unit { font-size: 14px; color: #888; margin-top: 5px; }
        
        .control-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .control-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .control-btn.on {
            background: #00ff88;
            color: #1a1a2e;
        }
        .control-btn.off {
            background: #ff4757;
            color: white;
        }
        .control-btn:hover { transform: scale(1.05); }
        
        .alarms { max-height: 300px; overflow-y: auto; }
        .alarm-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 10px;
            background: #0f3460;
            border-radius: 8px;
            border-left: 4px solid;
        }
        .alarm-item.warning { border-color: #ffc107; }
        .alarm-item.critical { border-color: #ff4757; }
        .alarm-item.info { border-color: #00d9ff; }
        
        .full-width { grid-column: 1 / -1; }
        
        .refresh-info {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 20px;
        }
        
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .nav-tab {
            padding: 10px 20px;
            background: #16213e;
            border: none;
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-tab.active {
            background: #00d9ff;
            color: #1a1a2e;
        }
        .nav-tab:hover { background: #0f3460; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏭 PLC 智能管控系统</h1>
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">连接中...</span>
                <span id="cpuState"></span>
            </div>
        </header>
        
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('monitor')">实时监控</button>
            <button class="nav-tab" onclick="showTab('control')">输出控制</button>
            <button class="nav-tab" onclick="showTab('alarms')">告警管理</button>
            <button class="nav-tab" onclick="showTab('diagnose')">AI诊断</button>
        </div>
        
        <div id="monitorTab">
            <div class="grid">
                <div class="card">
                    <h2>数字量输入 (I)</h2>
                    <div class="point-grid" id="inputs"></div>
                </div>
                
                <div class="card">
                    <h2>数字量输出 (Q)</h2>
                    <div class="point-grid" id="outputs"></div>
                </div>
            </div>
            
            <div class="grid">
                <div class="card full-width">
                    <h2>模拟量输入 (温度传感器)</h2>
                    <div class="analog-grid" id="analogs"></div>
                </div>
            </div>
        </div>
        
        <div id="controlTab" style="display:none;">
            <div class="card">
                <h2>数字量输出控制</h2>
                <div class="control-panel" id="controlPanel"></div>
            </div>
            
            <div class="card" style="margin-top:20px;">
                <h2>模拟量输出控制</h2>
                <div class="analog-grid" id="analogControl"></div>
            </div>
        </div>
        
        <div id="alarmsTab" style="display:none;">
            <div class="card">
                <h2>活动告警</h2>
                <div class="alarms" id="alarmsList"></div>
            </div>
        </div>
        
        <div id="diagnoseTab" style="display:none;">
            <div class="card">
                <h2>AI 故障诊断</h2>
                <textarea id="symptomInput" placeholder="描述故障现象，如：电机转速异常、温度过高等..." 
                    style="width:100%;height:100px;background:#0f3460;border:none;border-radius:8px;padding:15px;color:#eee;margin-bottom:15px;"></textarea>
                <button onclick="diagnose()" style="padding:12px 24px;background:#00d9ff;border:none;border-radius:8px;color:#1a1a2e;cursor:pointer;">
                    开始诊断
                </button>
                <div id="diagnoseResult" style="margin-top:20px;padding:20px;background:#0f3460;border-radius:8px;display:none;"></div>
            </div>
        </div>
        
        <p class="refresh-info">数据每秒自动刷新 | PLC: 192.168.2.1</p>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8080';
        let refreshInterval;
        
        async function fetchData() {
            try {
                const response = await fetch(`${API_URL}/api/plc/read`);
                const data = await response.json();
                updateUI(data);
                updateStatus(true, data.cpu_state);
            } catch (error) {
                updateStatus(false);
                console.error('Fetch error:', error);
            }
        }
        
        function updateStatus(online, cpuState = '') {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const cpu = document.getElementById('cpuState');
            
            dot.className = 'status-dot ' + (online ? 'online' : 'offline');
            text.textContent = online ? '已连接' : '断开连接';
            cpu.textContent = cpuState ? `[${cpuState}]` : '';
        }
        
        function updateUI(data) {
            // 更新数字量输入
            const inputsEl = document.getElementById('inputs');
            inputsEl.innerHTML = '';
            for (let i = 0; i <= 7; i++) {
                const point = data.points[`I0.${i}`];
                const value = point?.value || 'ERR';
                inputsEl.innerHTML += `
                    <div class="point">
                        <div class="point-name">I0.${i}</div>
                        <div class="point-value ${value === 'ON' ? 'on' : 'off'}">${value}</div>
                    </div>
                `;
            }
            
            // 更新数字量输出
            const outputsEl = document.getElementById('outputs');
            outputsEl.innerHTML = '';
            for (let i = 0; i <= 7; i++) {
                const point = data.points[`Q0.${i}`];
                const value = point?.value || 'ERR';
                outputsEl.innerHTML += `
                    <div class="point">
                        <div class="point-name">Q0.${i}</div>
                        <div class="point-value ${value === 'ON' ? 'on' : 'off'}">${value}</div>
                    </div>
                `;
            }
            
            // 更新模拟量输入
            const analogsEl = document.getElementById('analogs');
            analogsEl.innerHTML = '';
            ['AIW16', 'AIW18', 'AIW20', 'AIW22'].forEach(addr => {
                const point = data.points[addr];
                const rawValue = point?.raw_value || 0;
                const temp = (rawValue / 27648 * 100).toFixed(1);
                analogsEl.innerHTML += `
                    <div class="analog-item">
                        <div class="point-name">${addr}</div>
                        <div class="analog-value">${temp}°C</div>
                        <div class="analog-unit">原始值: ${rawValue}</div>
                    </div>
                `;
            });
            
            // 更新控制面板
            updateControlPanel(data.points);
        }
        
        function updateControlPanel(points) {
            const panel = document.getElementById('controlPanel');
            panel.innerHTML = '';
            for (let i = 0; i <= 7; i++) {
                const point = points[`Q0.${i}`];
                const isOn = point?.value === 'ON';
                panel.innerHTML += `
                    <button class="control-btn ${isOn ? 'on' : 'off'}" onclick="toggleOutput('Q0.${i}', ${isOn})">
                        Q0.${i}: ${isOn ? 'ON' : 'OFF'}
                    </button>
                `;
            }
            
            // 模拟量输出控制
            const analogCtrl = document.getElementById('analogControl');
            analogCtrl.innerHTML = '';
            ['AQW32', 'AQW34'].forEach(addr => {
                const point = points[addr];
                const value = point?.raw_value || 0;
                analogCtrl.innerHTML += `
                    <div class="analog-item">
                        <div class="point-name">${addr}</div>
                        <input type="range" min="0" max="27648" value="${value}" 
                            onchange="setAnalog('${addr}', this.value)" style="width:100%">
                        <div class="analog-value">${value}</div>
                    </div>
                `;
            });
        }
        
        async function toggleOutput(point, currentOn) {
            const newValue = currentOn ? 'OFF' : 'ON';
            try {
                await fetch(`${API_URL}/api/plc/write`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ point, value: newValue })
                });
                fetchData();
            } catch (error) {
                alert('写入失败: ' + error);
            }
        }
        
        async function setAnalog(point, value) {
            try {
                await fetch(`${API_URL}/api/plc/write`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ point, value: parseInt(value) })
                });
            } catch (error) {
                alert('写入失败: ' + error);
            }
        }
        
        async function loadAlarms() {
            try {
                const response = await fetch(`${API_URL}/api/alarms?status=active`);
                const data = await response.json();
                const list = document.getElementById('alarmsList');
                
                if (data.alarms.length === 0) {
                    list.innerHTML = '<p style="color:#888;text-align:center;">暂无活动告警</p>';
                    return;
                }
                
                list.innerHTML = data.alarms.map(alarm => `
                    <div class="alarm-item ${alarm.severity}">
                        <div>
                            <strong>${alarm.point}</strong>: ${alarm.message}
                            <br><small>${alarm.created_at}</small>
                        </div>
                        <button onclick="ackAlarm(${alarm.id})" style="padding:5px 10px;background:#0f3460;border:none;border-radius:5px;color:#eee;cursor:pointer;">
                            确认
                        </button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Load alarms error:', error);
            }
        }
        
        async function ackAlarm(id) {
            try {
                await fetch(`${API_URL}/api/alarms/${id}/acknowledge`, { method: 'POST' });
                loadAlarms();
            } catch (error) {
                alert('确认失败: ' + error);
            }
        }
        
        async function diagnose() {
            const symptom = document.getElementById('symptomInput').value;
            if (!symptom) {
                alert('请输入故障现象');
                return;
            }
            
            const resultEl = document.getElementById('diagnoseResult');
            resultEl.style.display = 'block';
            resultEl.innerHTML = '正在分析...';
            
            try {
                const response = await fetch(`${API_URL}/api/ai/diagnose`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symptom })
                });
                const data = await response.json();
                resultEl.innerHTML = `<pre style="white-space:pre-wrap;">${data.analysis}</pre>`;
            } catch (error) {
                resultEl.innerHTML = '诊断失败: ' + error;
            }
        }
        
        function showTab(tab) {
            // 隐藏所有标签
            document.querySelectorAll('[id$="Tab"]').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
            
            // 显示选中的标签
            document.getElementById(tab + 'Tab').style.display = 'block';
            event.target.classList.add('active');
            
            if (tab === 'alarms') loadAlarms();
        }
        
        // 初始化
        fetchData();
        refreshInterval = setInterval(fetchData, 1000);
    </script>
</body>
</html>
