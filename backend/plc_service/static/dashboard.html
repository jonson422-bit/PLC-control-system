<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLC 智能管控系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        header h1 { font-size: 24px; color: #00d9ff; }
        .status { 
            display: flex; 
            align-items: center; 
            gap: 10px;
            padding: 8px 16px;
            background: #0f3460;
            border-radius: 20px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .status-dot.online { background: #00ff88; }
        .status-dot.offline { background: #ff4757; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card h2 {
            font-size: 16px;
            color: #888;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .point-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .point {
            background: #0f3460;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s;
        }
        .point:hover { transform: translateY(-2px); }
        .point-name { font-size: 12px; color: #888; margin-bottom: 5px; }
        .point-value { font-size: 18px; font-weight: bold; }
        .point-value.on { color: #00ff88; }
        .point-value.off { color: #ff4757; }
        .point-value.analog { color: #00d9ff; }
        
        .analog-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .analog-item {
            background: #0f3460;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .analog-value {
            font-size: 36px;
            font-weight: bold;
            color: #00d9ff;
        }
        .analog-unit { font-size: 14px; color: #888; margin-top: 5px; }
        
        .control-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .control-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .control-btn.on {
            background: #00ff88;
            color: #1a1a2e;
        }
        .control-btn.off {
            background: #ff4757;
            color: white;
        }
        .control-btn:hover { transform: scale(1.05); }
        
        .alarms { max-height: 300px; overflow-y: auto; }
        .alarm-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 10px;
            background: #0f3460;
            border-radius: 8px;
            border-left: 4px solid;
        }
        .alarm-item.warning { border-color: #ffc107; }
        .alarm-item.critical { border-color: #ff4757; }
        .alarm-item.info { border-color: #00d9ff; }
        
        .full-width { grid-column: 1 / -1; }
        
        .refresh-info {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 20px;
        }
        
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .nav-tab {
            padding: 10px 20px;
            background: #16213e;
            border: none;
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-tab.active {
            background: #00d9ff;
            color: #1a1a2e;
        }
        .nav-tab:hover { background: #0f3460; }
        
        /* 设备管理样式 */
        .device-card {
            background: #0f3460;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .device-card.online { border-left: 4px solid #00ff88; }
        .device-card.offline { border-left: 4px solid #ff4757; }
        .device-info h3 { margin: 0 0 5px 0; font-size: 16px; }
        .device-info p { margin: 2px 0; color: #888; font-size: 13px; }
        .device-actions { display: flex; gap: 8px; }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-primary { background: #00d9ff; color: #1a1a2e; }
        .btn-secondary { background: #0f3460; color: #eee; }
        .btn-danger { background: #ff4757; color: #fff; }
        .btn-success { background: #00ff88; color: #1a1a2e; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        
        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #16213e;
            border-radius: 10px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h3 { margin: 0; }
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #888;
            font-size: 13px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            background: #0f3460;
            border: none;
            border-radius: 5px;
            color: #eee;
            font-size: 14px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-group input { width: auto; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏭 PLC 智能管控系统</h1>
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">连接中...</span>
                <span id="cpuState"></span>
            </div>
        </header>
        
        <div class="nav-tabs">
            <button class="nav-tab" onclick="showTab('monitor')">实时监控</button>
            <button class="nav-tab" onclick="showTab('history')">历史数据</button>
            <button class="nav-tab" onclick="showTab('variables')">变量管理</button>
            <button class="nav-tab" onclick="showTab('alarms')">告警管理</button>
            <button class="nav-tab" onclick="showTab('devices')">设备管理</button>
            <button class="nav-tab" onclick="showTab('knowledge')">知识诊断</button>
        </div>
        
        <div id="monitorTab">
            <div class="grid">
                <div class="card">
                    <h2>数字量输入 (I)</h2>
                    <div class="point-grid" id="inputs"></div>
                </div>
                
                <div class="card">
                    <h2>数字量输出 (Q)</h2>
                    <div class="point-grid" id="outputs"></div>
                </div>
            </div>
            
            <div class="grid">
                <div class="card">
                    <h2>内存变量 (M)</h2>
                    <div class="point-grid" id="memory"></div>
                </div>
                
                <div class="card">
                    <h2>模拟量输入 (AIW)</h2>
                    <div class="analog-grid" id="analogs"></div>
                </div>
            </div>
        </div>
        
        <div id="historyTab" style="display:none;">
            <!-- 历史数据图表 -->
            <div class="card" style="margin-bottom:20px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px;">
                    <h2 style="margin:0;">历史数据图表</h2>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                        <select id="historyPointSelect" style="padding:8px 12px;background:#0f3460;border:none;border-radius:5px;color:#eee;min-width:200px;">
                            <option value="">选择变量点位...</option>
                        </select>
                        <select id="historyHours" style="padding:8px 12px;background:#0f3460;border:none;border-radius:5px;color:#eee;">
                            <option value="1">最近1小时</option>
                            <option value="6">最近6小时</option>
                            <option value="24" selected>最近24小时</option>
                            <option value="72">最近3天</option>
                            <option value="168">最近7天</option>
                        </select>
                        <button onclick="loadHistoryChart()" style="padding:8px 16px;background:#00d9ff;border:none;border-radius:5px;color:#1a1a2e;cursor:pointer;font-weight:500;">📊 查询</button>
                    </div>
                </div>
                <div id="historyChartContainer" style="background:#0f3460;border-radius:8px;padding:20px;min-height:300px;">
                    <canvas id="historyChart"></canvas>
                </div>
                <div id="historyChartEmpty" style="display:none;text-align:center;padding:60px;color:#888;">
                    请选择变量点位查看历史数据
                </div>
            </div>
            
            <!-- 数据统计 -->
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px;">
                    <h2 style="margin:0;">数据统计</h2>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                        <select id="statsPointSelect" style="padding:8px 12px;background:#0f3460;border:none;border-radius:5px;color:#eee;min-width:200px;">
                            <option value="">选择变量点位...</option>
                        </select>
                        <select id="statsHours" style="padding:8px 12px;background:#0f3460;border:none;border-radius:5px;color:#eee;">
                            <option value="1">最近1小时</option>
                            <option value="24" selected>最近24小时</option>
                            <option value="168">最近7天</option>
                            <option value="720">最近30天</option>
                        </select>
                        <button onclick="loadStatistics()" style="padding:8px 16px;background:#00ff88;border:none;border-radius:5px;color:#1a1a2e;cursor:pointer;font-weight:500;">📈 统计</button>
                    </div>
                </div>
                <div id="statsContainer" style="display:none;">
                    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr));margin-bottom:20px;">
                        <div class="stat-card" style="background:#0f3460;border-radius:8px;padding:20px;text-align:center;">
                            <div style="color:#888;font-size:12px;margin-bottom:5px;">数据点数</div>
                            <div id="statsCount" style="font-size:28px;font-weight:bold;color:#00d9ff;">-</div>
                        </div>
                        <div class="stat-card" style="background:#0f3460;border-radius:8px;padding:20px;text-align:center;">
                            <div style="color:#888;font-size:12px;margin-bottom:5px;">最小值</div>
                            <div id="statsMin" style="font-size:28px;font-weight:bold;color:#ff4757;">-</div>
                        </div>
                        <div class="stat-card" style="background:#0f3460;border-radius:8px;padding:20px;text-align:center;">
                            <div style="color:#888;font-size:12px;margin-bottom:5px;">最大值</div>
                            <div id="statsMax" style="font-size:28px;font-weight:bold;color:#00ff88;">-</div>
                        </div>
                        <div class="stat-card" style="background:#0f3460;border-radius:8px;padding:20px;text-align:center;">
                            <div style="color:#888;font-size:12px;margin-bottom:5px;">平均值</div>
                            <div id="statsAvg" style="font-size:28px;font-weight:bold;color:#ffc107;">-</div>
                        </div>
                    </div>
                    <div style="background:#0f3460;border-radius:8px;padding:15px;">
                        <div style="display:flex;justify-content:space-between;color:#888;font-size:12px;">
                            <span>首次记录: <span id="statsFirstTime" style="color:#eee;">-</span></span>
                            <span>最后记录: <span id="statsLastTime" style="color:#eee;">-</span></span>
                        </div>
                    </div>
                </div>
                <div id="statsEmpty" style="text-align:center;padding:60px;color:#888;">
                    请选择变量点位进行数据统计
                </div>
            </div>
        </div>
        
        <div id="variablesTab" style="display:none;">
            <!-- 程序上传区域 -->
            <div class="card" style="margin-bottom:20px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px;">
                    <h2 style="margin:0;">程序与变量管理</h2>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;">
                        <input type="file" id="programFile" accept=".stl,.awl" style="display:none;" onchange="uploadProgram()">
                        <button onclick="document.getElementById('programFile').click()" style="padding:8px 16px;background:#00d9ff;border:none;border-radius:5px;color:#1a1a2e;cursor:pointer;font-weight:500;">📤 上传STL程序</button>
                        <select id="programSelect" onchange="loadProgramVariables()" style="padding:8px 12px;background:#0f3460;border:none;border-radius:5px;color:#eee;min-width:200px;">
                            <option value="">选择程序...</option>
                        </select>
                        <button onclick="loadProgramList()" style="padding:8px 16px;background:#0f3460;border:none;border-radius:5px;color:#eee;cursor:pointer;">🔄 刷新</button>
                    </div>
                </div>
                <div id="currentProgramInfo" style="background:#0f3460;border-radius:8px;padding:15px;margin-bottom:15px;display:none;">
                    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
                        <div>
                            <strong id="currentProgramName">-</strong>
                            <span style="color:#888;margin-left:10px;" id="currentProgramStats">变量数: 0</span>
                        </div>
                        <div style="display:flex;gap:8px;">
                            <button onclick="importAllVariables()" style="padding:5px 15px;background:#00ff88;border:none;border-radius:5px;color:#1a1a2e;cursor:pointer;font-weight:500;">📥 全部导入点位</button>
                            <button onclick="importSelectedVariables()" style="padding:5px 15px;background:#ffc107;border:none;border-radius:5px;color:#1a1a2e;cursor:pointer;font-weight:500;">📥 导入选中</button>
                            <button onclick="deleteProgram()" style="padding:5px 15px;background:#ff4757;border:none;border-radius:5px;color:#fff;cursor:pointer;">🗑️ 删除程序</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 变量列表 -->
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px;">
                    <h2 style="margin:0;">变量点位列表</h2>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;">
                        <input type="checkbox" id="selectAllVars" onchange="toggleSelectAll()" style="width:18px;height:18px;cursor:pointer;">
                        <label for="selectAllVars" style="color:#888;cursor:pointer;">全选</label>
                        <select id="varCategoryFilter" onchange="filterVariables()" style="padding:8px 12px;background:#0f3460;border:none;border-radius:5px;color:#eee;">
                            <option value="">所有分类</option>
                            <option value="input">数字量输入</option>
                            <option value="output">数字量输出</option>
                            <option value="analog_in">模拟量输入</option>
                            <option value="analog_out">模拟量输出</option>
                            <option value="memory">内存区</option>
                        </select>
                        <select id="varImportFilter" onchange="filterVariables()" style="padding:8px 12px;background:#0f3460;border:none;border-radius:5px;color:#eee;">
                            <option value="">全部状态</option>
                            <option value="imported">已导入</option>
                            <option value="not_imported">未导入</option>
                        </select>
                        <button class="btn btn-primary" onclick="showPointModal()">+ 手动添加点位</button>
                    </div>
                </div>
                <div id="variablesList" style="max-height:500px;overflow-y:auto;">
                    <p style="color:#888;text-align:center;padding:40px;">请上传或选择程序查看变量</p>
                </div>
            </div>
        </div>
        
        <div id="alarmsTab" style="display:none;">
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
                    <h2 style="margin:0;">活动告警</h2>
                    <button class="btn btn-secondary" onclick="loadAlarms()">刷新</button>
                </div>
                <div class="alarms" id="alarmsList"></div>
            </div>
            <div class="card" style="margin-top:20px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
                    <h2 style="margin:0;">告警规则</h2>
                    <button class="btn btn-primary" onclick="showAlarmRuleModal()">+ 添加规则</button>
                </div>
                <div id="alarmRulesList" style="max-height:400px;overflow-y:auto;"></div>
            </div>
        </div>
        
        <div id="devicesTab" style="display:none;">
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
                    <h2 style="margin:0;">设备列表</h2>
                    <button class="btn btn-primary" onclick="showDeviceModal()">+ 添加设备</button>
                </div>
                <div id="devicesList"></div>
            </div>
        </div>
        
        <div id="knowledgeTab" style="display:none;">
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px;">
                    <h2 style="margin:0;">知识库管理</h2>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;">
                        <input type="text" id="knowledgeSearch" placeholder="搜索知识..." 
                            style="padding:8px 12px;background:#0f3460;border:none;border-radius:5px;color:#eee;width:200px;">
                        <select id="knowledgeCategory" onchange="loadKnowledge()" style="padding:8px 12px;background:#0f3460;border:none;border-radius:5px;color:#eee;">
                            <option value="">所有分类</option>
                        </select>
                        <button class="btn btn-primary" onclick="showKnowledgeModal()">+ 添加知识</button>
                        <input type="file" id="knowledgeFile" accept=".json,.md" style="display:none;" onchange="uploadKnowledgeFile()">
                        <button class="btn btn-secondary" onclick="document.getElementById('knowledgeFile').click()">📤 导入文件</button>
                    </div>
                </div>
                <div id="knowledgeList" style="max-height:600px;overflow-y:auto;"></div>
            </div>
        </div>
        
        <div id="diagnoseTab" style="display:none;">
            <div class="card">
                <h2>AI 故障诊断</h2>
                <textarea id="symptomInput" placeholder="描述故障现象，如：电机转速异常、温度过高等..." 
                    style="width:100%;height:100px;background:#0f3460;border:none;border-radius:8px;padding:15px;color:#eee;margin-bottom:15px;"></textarea>
                <button onclick="diagnose()" style="padding:12px 24px;background:#00d9ff;border:none;border-radius:8px;color:#1a1a2e;cursor:pointer;">
                    开始诊断
                </button>
                <div id="diagnoseResult" style="margin-top:20px;padding:20px;background:#0f3460;border-radius:8px;display:none;"></div>
            </div>
        </div>
        
        <p class="refresh-info">数据每秒自动刷新 | PLC: 192.168.2.1</p>
    </div>
    
    <!-- 设备编辑模态框 -->
    <div class="modal" id="deviceModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">添加设备</h3>
                <button class="modal-close" onclick="closeDeviceModal()">&times;</button>
            </div>
            <form id="deviceForm" onsubmit="saveDevice(event)">
                <input type="hidden" id="deviceId">
                <div class="form-group">
                    <label>设备名称 *</label>
                    <input type="text" id="deviceName" required placeholder="如：主PLC">
                </div>
                <div class="form-group">
                    <label>IP 地址 *</label>
                    <input type="text" id="deviceIp" required placeholder="如：192.168.2.1">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>协议</label>
                        <select id="deviceProtocol">
                            <option value="s7">S7 (西门子)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Rack</label>
                        <input type="number" id="deviceRack" value="0" min="0">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Slot</label>
                        <input type="number" id="deviceSlot" value="1" min="0">
                    </div>
                    <div class="form-group">
                        <label>&nbsp;</label>
                        <div class="checkbox-group">
                            <input type="checkbox" id="deviceEnabled" checked>
                            <label style="margin:0;">启用设备</label>
                        </div>
                    </div>
                </div>
                <div style="display:flex;gap:10px;margin-top:20px;">
                    <button type="submit" class="btn btn-primary" style="flex:1;">保存</button>
                    <button type="button" class="btn btn-secondary" onclick="closeDeviceModal()">取消</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 知识库编辑模态框 -->
    <div class="modal" id="knowledgeModal">
        <div class="modal-content" style="max-width:600px;">
            <div class="modal-header">
                <h3 id="knowledgeModalTitle">添加知识</h3>
                <button class="modal-close" onclick="closeKnowledgeModal()">&times;</button>
            </div>

    <!-- 点位编辑模态框 -->
    <div class="modal" id="pointModal">

                        <label>&nbsp;</label>

                            <label style="margin:0;">记录历史</label>

                    <button type="button" class="btn btn-secondary" onclick="closePointModal()">取消</button>
                </div>
            </form>
        </div>
    </div>
    <script>
        const API_URL = window.location.origin;
        let ws = null;
        let wsReconnectTimer = null;
        let heartbeatTimer = null;
        
        // ============ WebSocket 连接管理 ============
        function connectWebSocket() {
            const wsUrl = `ws://${window.location.host}/ws`;
            console.log('🔌 连接 WebSocket:', wsUrl);
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = function() {
                console.log('✅ WebSocket 已连接');
                startHeartbeat();
            };
            
            ws.onmessage = function(event) {
                try {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                } catch (e) {
                    console.error('WebSocket 消息解析错误:', e);
                }
            };
            
            ws.onclose = function() {
                console.log('🔴 WebSocket 已断开');
                stopHeartbeat();
                scheduleReconnect();
            };
            
            ws.onerror = function(error) {
                console.error('WebSocket 错误:', error);
            };
        }
        
        function handleMessage(msg) {
            switch (msg.type) {
                case 'plc_data':
                    // 处理 PLC 数据
                    if (msg.data) {
                        // 更新监控配置（如果后端返回了）
                        if (msg.monitor_config) {
                            window.monitorPointsConfig = msg.monitor_config;
                        }
                        
                        // 构建点位数据对象
                        const points = {};
                        msg.data.forEach(item => {
                            points[item.address] = item;
                        });
                        updateUI({ points, cpu_state: 'RUN' });
                        updateStatus(true, 'RUN');
                    }
                    break;
                    
                case 'plc_disconnected':
                    // PLC 断开连接 - 仍显示监控变量但标记为未连接
                    updateStatus(false);
                    // 显示已配置的监控变量（无值状态）
                    if (window.monitorPointsConfig && window.monitorPointsConfig.length > 0) {
                        updateDisconnectedMonitor();
                    }
                    break;
                
                case 'alarm':
                    // 处理告警消息
                    const data = msg.data;
                    if (data.point === 'PLC_CONNECTION') {
                        // PLC 连接状态变化
                        if (data.value === 0) {
                            updateStatus(false);
                        } else {
                            updateStatus(true, 'RUN');
                        }
                    }
                    // 显示告警 toast
                    showToast(data.message, data.severity);
                    break;
                    
                case 'pong':
                    // 心跳响应
                    break;
                    
                default:
                    console.log('未知消息类型:', msg.type);
            }
        }
        
        function startHeartbeat() {
            heartbeatTimer = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'ping' }));
                }
            }, 30000); // 每30秒发送心跳
        }
        
        function stopHeartbeat() {
            if (heartbeatTimer) {
                clearInterval(heartbeatTimer);
                heartbeatTimer = null;
            }
        }
        
        function scheduleReconnect() {
            if (wsReconnectTimer) return;
            wsReconnectTimer = setTimeout(() => {
                wsReconnectTimer = null;
                connectWebSocket();
            }, 3000); // 3秒后重连
        }
        
        function showToast(message, severity = 'info') {
            // 创建 toast 元素
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                padding: 12px 20px;
                background: ${severity === 'critical' ? '#ff4757' : severity === 'warning' ? '#ffc107' : '#00d9ff'};
                color: ${severity === 'warning' ? '#333' : '#fff'};
                border-radius: 8px;
                z-index: 2000;
                animation: fadeIn 0.3s;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // 初始化 WebSocket
        connectWebSocket();
        
        // 保留 fetchData 作为备用（WebSocket 断开时使用）
        async function fetchData() {
            try {
                const response = await fetch(`${API_URL}/api/plc/read`);
                const data = await response.json();
                updateUI(data);
                updateStatus(true, data.cpu_state);
            } catch (error) {
                updateStatus(false);
                console.error('Fetch error:', error);
            }
        }
        
        function updateStatus(online, cpuState = '') {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const cpu = document.getElementById('cpuState');
            
            dot.className = 'status-dot ' + (online ? 'online' : 'offline');
            text.textContent = online ? '已连接' : '断开连接';
            cpu.textContent = cpuState ? `[${cpuState}]` : '';
        }
        
        function updateUI(data) {
            // 如果有配置的监控变量，动态显示
            if (window.monitorPointsConfig && window.monitorPointsConfig.length > 0) {
                updateDynamicMonitor(data);
            } else {
                // 默认显示（兼容旧版本）
                updateDefaultMonitor(data);
            }
            
            // 控制面板已移除（只读模式，禁止写入PLC）
        }
        
        // 动态显示用户配置的监控变量
        // 缓存上一次的数据，用于增量更新
        let lastPointsData = {};
        
        function updateDynamicMonitor(data) {
            // 按类型分组
            const digitalInputs = [];
            const digitalOutputs = [];
            const analogInputs = [];
            const memoryVars = [];
            
            window.monitorPointsConfig.forEach(mp => {
                // mp.address 是点位地址（如 I0.0, Q0.0 等）
                const point = data.points[mp.address];
                const value = point?.value;
                const rawValue = point?.raw_value;
                
                // 构建显示数据
                const displayItem = {
                    ...mp,
                    value: value,
                    rawValue: rawValue
                };
                
                // 按分类分组（优先使用数据库category字段）
                const category = mp.category || 'input';
                const addr = (mp.address || '').toUpperCase();
                
                if (category === 'memory' || addr.startsWith('M') || addr.startsWith('V')) {
                    memoryVars.push(displayItem);
                } else if (category === 'input' || (addr.startsWith('I') && !addr.startsWith('IW') && !addr.startsWith('AIW'))) {
                    digitalInputs.push(displayItem);
                } else if (category === 'output' || (addr.startsWith('Q') && !addr.startsWith('QW') && !addr.startsWith('AQW'))) {
                    digitalOutputs.push(displayItem);
                } else if (category === 'analog_in' || addr.startsWith('AIW') || addr.startsWith('IW')) {
                    analogInputs.push(displayItem);
                } else if (category === 'analog_out' || addr.startsWith('AQW') || addr.startsWith('QW')) {
                    analogInputs.push(displayItem);
                }
            });
            
            // 使用增量更新，只更新变化的值
            renderPointsList('inputs', digitalInputs, 'bit');
            renderPointsList('outputs', digitalOutputs, 'bit');
            renderPointsList('memory', memoryVars, 'bit');
            renderPointsList('analogs', analogInputs, 'analog');
        }
        
        // 高效渲染点位列表（增量更新）
        function renderPointsList(containerId, items, type) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            // 检查是否需要完全重建（列表变化）
            const currentKeys = new Set(items.map(p => p.address || p.name));
            const cachedKeys = new Set(Object.keys(lastPointsData).filter(k => {
                const item = items.find(i => (i.address || i.name) === k);
                return item !== undefined;
            }));
            
            const needRebuild = currentKeys.size !== cachedKeys.size || 
                               [...currentKeys].some(k => !cachedKeys.has(k));
            
            if (needRebuild) {
                // 列表变化，完全重建
                const fragment = document.createDocumentFragment();
                
                if (items.length === 0) {
                    const emptyMsg = document.createElement('p');
                    emptyMsg.style.cssText = 'color:#888;padding:20px;';
                    emptyMsg.textContent = type === 'bit' ? '未配置监控变量' : '未配置模拟量输入监控';
                    fragment.appendChild(emptyMsg);
                } else {
                    items.forEach(p => {
                        const element = createPointElement(p, type);
                        fragment.appendChild(element);
                    });
                }
                
                container.innerHTML = '';
                container.appendChild(fragment);
            } else {
                // 列表未变，只更新值
                items.forEach(p => {
                    const key = p.address || p.name;
                    const element = container.querySelector(`[data-key="${key}"]`);
                    if (element) {
                        updatePointElement(element, p, type);
                    }
                });
            }
        }
        
        // 创建点位元素
        function createPointElement(p, type) {
            const key = p.address || p.name;
            
            if (type === 'analog') {
                const raw = p.rawValue || p.raw_value || 0;
                const displayValue = (raw / 27648 * 100).toFixed(1);
                const displayName = p.name || p.address;
                const unit = p.unit || '';
                
                const div = document.createElement('div');
                div.className = 'analog-item';
                div.dataset.key = key;
                div.innerHTML = `
                    <div class="point-name" title="${p.description || ''}">${displayName}</div>
                    <div class="analog-value">${displayValue}${unit}</div>
                    <div class="analog-unit">原始值: ${raw}</div>
                `;
                return div;
            } else {
                const isOn = p.value === 'ON' || p.value === 1 || p.value === true;
                const displayName = p.name || p.address;
                
                const div = document.createElement('div');
                div.className = 'point';
                div.dataset.key = key;
                div.innerHTML = `
                    <div class="point-name" title="${p.description || ''}">${displayName}</div>
                    <div class="point-value ${isOn ? 'on' : 'off'}">${isOn ? 'ON' : 'OFF'}</div>
                `;
                return div;
            }
        }
        
        // 增量更新点位元素
        function updatePointElement(element, p, type) {
            if (type === 'analog') {
                const raw = p.rawValue || p.raw_value || 0;
                const displayValue = (raw / 27648 * 100).toFixed(1);
                const unit = p.unit || '';
                
                const valueEl = element.querySelector('.analog-value');
                const unitEl = element.querySelector('.analog-unit');
                if (valueEl) valueEl.textContent = `${displayValue}${unit}`;
                if (unitEl) unitEl.textContent = `原始值: ${raw}`;
            } else {
                const isOn = p.value === 'ON' || p.value === 1 || p.value === true;
                const valueEl = element.querySelector('.point-value');
                if (valueEl) {
                    valueEl.textContent = isOn ? 'ON' : 'OFF';
                    valueEl.className = `point-value ${isOn ? 'on' : 'off'}`;
                }
            }
        }
        
        // PLC 断开时显示监控变量（无值状态）
        function updateDisconnectedMonitor() {
            const digitalInputs = [];
            const digitalOutputs = [];
            const analogInputs = [];
            const memoryVars = [];
            
            window.monitorPointsConfig.forEach(mp => {
                const category = mp.category || 'input';
                const addr = (mp.address || '').toUpperCase();
                
                if (category === 'memory' || addr.startsWith('M') || addr.startsWith('V')) {
                    memoryVars.push(mp);
                } else if (category === 'input' || (addr.startsWith('I') && !addr.startsWith('IW') && !addr.startsWith('AIW'))) {
                    digitalInputs.push(mp);
                } else if (category === 'output' || (addr.startsWith('Q') && !addr.startsWith('QW') && !addr.startsWith('AQW'))) {
                    digitalOutputs.push(mp);
                } else if (category === 'analog_in' || addr.startsWith('AIW') || addr.startsWith('IW')) {
                    analogInputs.push(mp);
                }
            });
            
            // 使用相同的渲染方法，传入断开状态标记
            renderDisconnectedList('inputs', digitalInputs, 'bit');
            renderDisconnectedList('outputs', digitalOutputs, 'bit');
            renderDisconnectedList('memory', memoryVars, 'bit');
            renderDisconnectedList('analogs', analogInputs, 'analog');
        }
        
        // 渲染断开状态的点位列表
        function renderDisconnectedList(containerId, items, type) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            const fragment = document.createDocumentFragment();
            
            if (items.length === 0) {
                const emptyMsg = document.createElement('p');
                emptyMsg.style.cssText = 'color:#888;padding:20px;';
                emptyMsg.textContent = type === 'bit' ? '未配置监控变量' : '未配置模拟量输入监控';
                fragment.appendChild(emptyMsg);
            } else {
                items.forEach(p => {
                    const element = createDisconnectedElement(p, type);
                    fragment.appendChild(element);
                });
            }
            
            container.innerHTML = '';
            container.appendChild(fragment);
        }
        
        // 创建断开状态的点位元素
        function createDisconnectedElement(p, type) {
            const key = p.address || p.name;
            const displayName = p.name || p.address;
            
            if (type === 'analog') {
                const div = document.createElement('div');
                div.className = 'analog-item';
                div.style.opacity = '0.6';
                div.dataset.key = key;
                div.innerHTML = `
                    <div class="point-name" title="${p.description || ''}">${displayName}</div>
                    <div class="analog-value" style="color:#888;">--</div>
                    <div class="analog-unit">PLC 未连接</div>
                `;
                return div;
            } else {
                const div = document.createElement('div');
                div.className = 'point';
                div.style.opacity = '0.6';
                div.dataset.key = key;
                div.innerHTML = `
                    <div class="point-name" title="${p.description || ''}">${displayName}</div>
                    <div class="point-value" style="color:#888;">--</div>
                `;
                return div;
            }
        }
        
        // 默认显示（兼容旧版本）
        function updateDefaultMonitor(data) {
            // 更新数字量输入
            const inputsEl = document.getElementById('inputs');
            inputsEl.innerHTML = '';
            for (let i = 0; i <= 7; i++) {
                const point = data.points[`I0.${i}`];
                const value = point?.value || 'ERR';
                inputsEl.innerHTML += `
                    <div class="point">
                        <div class="point-name">I0.${i}</div>
                        <div class="point-value ${value === 'ON' ? 'on' : 'off'}">${value}</div>
                    </div>
                `;
            }
            
            // 更新数字量输出
            const outputsEl = document.getElementById('outputs');
            outputsEl.innerHTML = '';
            for (let i = 0; i <= 7; i++) {
                const point = data.points[`Q0.${i}`];
                const value = point?.value || 'ERR';
                outputsEl.innerHTML += `
                    <div class="point">
                        <div class="point-name">Q0.${i}</div>
                        <div class="point-value ${value === 'ON' ? 'on' : 'off'}">${value}</div>
                    </div>
                `;
            }
            
            // 更新模拟量输入
            const analogsEl = document.getElementById('analogs');
            analogsEl.innerHTML = '';
            ['AIW16', 'AIW18', 'AIW20', 'AIW22'].forEach(addr => {
                const point = data.points[addr];
                const rawValue = point?.raw_value || 0;
                const temp = (rawValue / 27648 * 100).toFixed(1);
                analogsEl.innerHTML += `
                    <div class="analog-item">
                        <div class="point-name">${addr}</div>
                        <div class="analog-value">${temp}°C</div>
                        <div class="analog-unit">原始值: ${rawValue}</div>
                    </div>
                `;
            });
            
            // 控制面板已移除（只读模式，禁止写入PLC）
        }
        
        async function loadAlarms() {
            try {
                const response = await fetch(`${API_URL}/api/alarms?status=active`);
                const data = await response.json();
                const list = document.getElementById('alarmsList');
                
                if (data.alarms.length === 0) {
                    list.innerHTML = '<p style="color:#888;text-align:center;">暂无活动告警</p>';
                    return;
                }
                
                list.innerHTML = data.alarms.map(alarm => `
                    <div class="alarm-item ${alarm.severity}">
                        <div>
                            <strong>${alarm.point}</strong>: ${alarm.message}
                            <br><small>${alarm.created_at}</small>
                        </div>

            document.getElementById('rulePoint').value = rule ? rule.point : '';
            document.getElementById('ruleOperator').value = rule && rule.condition ? rule.condition.operator : '>';
            document.getElementById('ruleThreshold').value = rule && rule.condition ? rule.condition.value : '';
            document.getElementById('ruleSeverity').value = rule ? (rule.severity || 'warning') : 'warning';

        async function saveAlarmRule(event) {
            event.preventDefault();
            
            const ruleData = {
                name: document.getElementById('ruleName').value,
                point: document.getElementById('rulePoint').value,
                condition: {
                    operator: document.getElementById('ruleOperator').value,
                    value: parseFloat(document.getElementById('ruleThreshold').value)
                },
                severity: document.getElementById('ruleSeverity').value,
                message: document.getElementById('ruleMessage').value,
                cooldown_seconds: parseInt(document.getElementById('ruleCooldown').value) || 60
            };
            
            try {
                const url = editingAlarmRuleId 
                    ? `${API_URL}/api/alarms/rules/${editingAlarmRuleId}`
                    : `${API_URL}/api/alarms/rules`;
                const method = editingAlarmRuleId ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(ruleData)
                });
                
                const data = await response.json();
                if (data.success || data.rule_id) {
                    closeAlarmRuleModal();
                    loadAlarmRules();
                } else {
                    alert('保存失败: ' + JSON.stringify(data));

                alert('保存失败: ' + error);

        function renderVariablesList() {
            const listEl = document.getElementById('variablesList');
            const categoryFilter = document.getElementById('varCategoryFilter').value;
            const importFilter = document.getElementById('varImportFilter').value;
            
            // 过滤变量
            let filtered = allVariables.filter(v => {
                // 过滤无地址的变量
                if (!v.address) return false;
                
                // 分类过滤
                if (categoryFilter) {
                    const cat = getAddressCategory(v.address);
                    if (cat !== categoryFilter) return false;
                }
                
                // 导入状态过滤
                if (importFilter === 'imported' && !v.imported) return false;
                if (importFilter === 'not_imported' && v.imported) return false;
                
                return true;
            });
            
            if (filtered.length === 0) {
                listEl.innerHTML = '<p style="color:#888;text-align:center;padding:40px;">没有符合条件的变量</p>';
                return;

            const categoryColors = {

                'analog_out': '#ff6b6b',

            };
            
            const categoryLabels = {
                'input': '数字量输入',
                'output': '数字量输出',

                <thead>
                    <tr style="border-bottom:1px solid #333;">

                        <th style="padding:10px;text-align:left;color:#888;">名称</th>
                        <th style="padding:10px;text-align:left;color:#888;">类型</th>
                        <th style="padding:10px;text-align:left;color:#888;">分类</th>
                        <th style="padding:10px;text-align:left;color:#888;">注释</th>

                        <th style="padding:10px;text-align:center;color:#888;width:150px;">操作</th>
                    </tr>
                </thead>
                <tbody>
                    ${filtered.map((v, idx) => {
                        const cat = getAddressCategory(v.address);
                        const catColor = categoryColors[cat] || '#888';
                        const catLabel = categoryLabels[cat] || cat;
                        const originalIdx = allVariables.indexOf(v);
                        const isMonitored = monitoredPointIds.includes(v.point_id);
                        
                        return `
                            <tr style="border-bottom:1px solid #222;" data-idx="${originalIdx}">
                                <td style="padding:10px;">
                                    <input type="checkbox" class="var-checkbox" data-idx="${originalIdx}" ${v.imported ? 'disabled' : ''}>
                                </td>
                                <td style="padding:10px;font-family:monospace;color:#00d9ff;font-weight:bold;">${v.address}</td>
                                <td style="padding:10px;">${v.name || '-'}</td>
                                <td style="padding:10px;color:#888;">${v.var_type || '-'}</td>
                                <td style="padding:10px;">
                                    <span style="background:${catColor}22;color:${catColor};padding:2px 8px;border-radius:4px;font-size:12px;">${catLabel}</span>
                                </td>
                                <td style="padding:10px;color:#888;max-width:200px;overflow:hidden;text-overflow:ellipsis;" title="${v.comment || ''}">${v.comment || '-'}</td>
                                <td style="padding:10px;text-align:center;">
                                    ${v.imported 
                                        ? '<span style="color:#00ff88;">✓ 已导入</span>' 
                                        : '<span style="color:#888;">未导入</span>'}

                                           <button class="btn btn-danger" style="padding:4px 8px;font-size:12px;" onclick="deleteVariablePoint(${originalIdx})">删除</button>` 
                                        : `<button class="btn btn-primary" style="padding:4px 8px;font-size:12px;" onclick="importSingleVariable(${originalIdx})">导入</button>`}
                                </td>
                            </tr>
                        `;
                    }).join('')}
                </tbody>
            </table>`;
        }

        function getAddressCategory(address) {
            if (!address) return 'memory';
            const addr = address.toUpperCase().trim();
            if (addr.startsWith('I') && !addr.startsWith('AIW')) return 'input';
            if (addr.startsWith('Q') && !addr.startsWith('AQW')) return 'output';
            if (addr.startsWith('AIW')) return 'analog_in';
            if (addr.startsWith('AQW')) return 'analog_out';
            return 'memory';
        }

        // ============ 历史数据功能 ============
        let historyChart = null;
        
        async function loadHistoryPointOptions() {
            // 从监控配置和点位列表加载可选变量
            try {
                const [monitorRes, pointsRes] = await Promise.all([
                    fetch(`${API_URL}/api/points/monitor/list`),
                    fetch(`${API_URL}/api/points`)
                ]);
                
                const monitorData = await monitorRes.json();
                const pointsData = await pointsRes.json();
                
                // 合并去重
                const pointSet = new Set();
                const options = [];
                
                // 先添加监控配置中的点位
                monitorData.forEach(p => {
                    if (!pointSet.has(p.address)) {
                        pointSet.add(p.address);
                        options.push({ address: p.address, name: p.name || p.address });
                    }
                });

        function drawLineChart(canvasId, labels, values, title) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            
            // 设置canvas尺寸
            const container = canvas.parentElement;
            canvas.width = container.clientWidth - 40;
            canvas.height = 280;
            
            const width = canvas.width;
            const height = canvas.height;
            const padding = { top: 30, right: 20, bottom: 40, left: 60 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;
            
            // 清空画布
            ctx.clearRect(0, 0, width, height);
            
            // 计算数据范围
            const minVal = Math.min(...values);
            const maxVal = Math.max(...values);
            const range = maxVal - minVal || 1;
            
            // 绘制背景网格
            ctx.strokeStyle = '#1a3a5c';
            ctx.lineWidth = 1;
            
            for (let i = 0; i <= 5; i++) {
                const y = padding.top + (chartHeight / 5) * i;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(width - padding.right, y);
                ctx.stroke();
                
                // Y轴标签
                const value = maxVal - (range / 5) * i;
                ctx.fillStyle = '#888';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(value.toFixed(1), padding.left - 8, y + 4);
            }
            
            // 绘制折线
            ctx.strokeStyle = '#00d9ff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            
            const stepX = chartWidth / (values.length - 1 || 1);
            
            values.forEach((val, i) => {
                const x = padding.left + stepX * i;
                const y = padding.top + chartHeight - ((val - minVal) / range) * chartHeight;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            
            ctx.stroke();
            
            // 绘制数据点
            ctx.fillStyle = '#00d9ff';
            values.forEach((val, i) => {
                const x = padding.left + stepX * i;
                const y = padding.top + chartHeight - ((val - minVal) / range) * chartHeight;
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // X轴标签（只显示部分）
            ctx.fillStyle = '#888';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            
            const labelStep = Math.ceil(labels.length / 8);
            labels.forEach((label, i) => {
                if (i % labelStep === 0) {
                    const x = padding.left + stepX * i;
                    ctx.fillText(label, x, height - 10);
                }
            });
            
            // 标题
            ctx.fillStyle = '#eee';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(title, width / 2, 18);
        }

        function closePointModal() {
            document.getElementById('pointModal').classList.remove('show');
            editingPointId = null;
        }
        
        async function savePoint(event) {
            event.preventDefault();
            
            const pointData = {
                address: document.getElementById('pointAddress').value,
                name: document.getElementById('pointName').value,
                category: document.getElementById('pointType').value,
                data_type: document.getElementById('pointDataType').value,
                unit: document.getElementById('pointUnit').value,
                description: document.getElementById('pointDesc').value,
                enabled: document.getElementById('pointEnabled').checked
            };
            
            try {
                const url = editingPointId 
                    ? `${API_URL}/api/points/${editingPointId}`
                    : `${API_URL}/api/points`;
                const method = editingPointId ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pointData)
                });
                
                const data = await response.json();
                if (data.id || data.success) {
                    closePointModal();
                    // 如果在变量管理界面，刷新变量列表
                    if (currentProgramId) {
                        await loadProgramVariables();
                    }
                    showToast('点位保存成功', 'success');
                } else {
                    alert('保存失败: ' + JSON.stringify(data));
                }
            } catch (error) {
                alert('保存失败: ' + error);
            }
        }
        
        async function editPoint(pointId) {
            try {
                const response = await fetch(`${API_URL}/api/points/${pointId}`);
                const point = await response.json();
                showPointModal(point);
            } catch (error) {
                alert('获取点位信息失败: ' + error);
            }
        }
        
        async function deletePoint(pointId) {
            if (!confirm('确定要删除这个点位吗？')) return;
            
            try {
                const response = await fetch(`${API_URL}/api/points/${pointId}`, { method: 'DELETE' });
                const data = await response.json();
                if (data.success || data.message) {
                    // 如果在变量管理界面，刷新变量列表
                    if (currentProgramId) {
                        await loadProgramVariables();
                    }
                    showToast('点位已删除', 'success');
                } else {
                    alert('删除失败: ' + JSON.stringify(data));
                }
            } catch (error) {
                alert('删除失败: ' + error);
            }
        }
        
        // 初始化已完成（WebSocket 自动连接）
    </script>
</body>
